<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #2563eb;
    }

    p {
      text-align: center;
      color: #6b7280;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .todo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafb;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .todo span {
      flex: 1;
      cursor: pointer;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .delete {
      background: #dc2626;
    }

    .delete:hover {
      background: #b91c1c;
    }

    .edit {
      background: #16a34a;
    }

    .edit:hover {
      background: #15803d;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Todo List App</h1>
    <p>DSO101 CI/CD Assignment</p>

    <div class="form">
      <input type="text" id="todoInput" placeholder="Enter a task" />
      <button onclick="addTodo()">Add</button>
    </div>

    <div id="todoList"></div>
  </div>

  <script>
    const API_URL = "https://be-todo-t058.onrender.com";

    async function fetchTodos() {
      try {
        const response = await fetch(`${API_URL}/todos`);
        const todos = await response.json();

        const todoList = document.getElementById("todoList");
        todoList.innerHTML = "";

        if (todos.length === 0) {
          todoList.innerHTML = "<p>No tasks yet.</p>";
          return;
        }

        todos.forEach((todo) => {
          const div = document.createElement("div");
          div.className = "todo";

          div.innerHTML = `
            <span class="${todo.completed ? "completed" : ""}" onclick="toggleTodo(${todo.id}, '${todo.title}', ${todo.completed})">
              ${todo.title}
            </span>

            <div class="actions">
              <button class="edit" onclick="editTodo(${todo.id}, '${todo.title}', ${todo.completed})">Edit</button>
              <button class="delete" onclick="deleteTodo(${todo.id})">Delete</button>
            </div>
          `;

          todoList.appendChild(div);
        });
      } catch (error) {
        console.log("Error fetching todos:", error);
      }
    }

    async function addTodo() {
      const input = document.getElementById("todoInput");
      const title = input.value;

      if (!title.trim()) {
        alert("Please enter a task");
        return;
      }

      await fetch(`${API_URL}/todos`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ title })
      });

      input.value = "";
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API_URL}/todos/${id}`, {
        method: "DELETE"
      });

      fetchTodos();
    }

    async function toggleTodo(id, title, completed) {
      await fetch(`${API_URL}/todos/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title,
          completed: !completed
        })
      });

      fetchTodos();
    }

    async function editTodo(id, oldTitle, completed) {
      const newTitle = prompt("Edit task:", oldTitle);

      if (!newTitle) return;

      await fetch(`${API_URL}/todos/${id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title: newTitle,
          completed
        })
      });

      fetchTodos();
    }

    fetchTodos();
  </script>
</body>
</html>
