services:
  - type: web
    name: be-todo
    env: docker
    plan: free
    rootDir: Backend
    dockerfilePath: Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString

  - type: web
    name: fe-todo
    env: docker
    plan: free
    rootDir: Frontend
    dockerfilePath: Dockerfile

databases:
  - name: todo-db
    plan: free